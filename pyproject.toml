[tool.ruff]
target-version = "py39"
line-length = 120
exclude = [
    ".git",
    ".pytest_cache",
    "data",
    "venv",
    ".venv",
]

[tool.ruff.lint]
# Keep lint conservative for this educational project:
# - E9: syntax/runtime parse errors
# - F63/F7/F82: critical Pyflakes errors such as undefined names
select = ["E9", "F63", "F7", "F82"]
ignore = []
